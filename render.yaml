services:
  - type: web
    name: disciplineai-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_DOCS
        value: "false"
  - type: worker
    name: disciplineai-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.runner.celery_app worker --loglevel=info
    plan: starter
